{% extends 'sitio1/base.html' %}
{% load crispy_forms_tags %}
{% load static %}
{% block js %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
{% endblock %}


{% block css %}
    <style>
        body {
            background-image: url("{% static 'sitio1/imagenes/CRUD.jpg' %}");
            background-size: cover;
            background-position: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
        }

        table {
            width: 80%;
            margin: 10px 0;
        }

        th, td {
            text-align: center;
        }

        th {
            background-color: #007bff;
            color: #fff;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }

        .btn-danger {
            background-color: #dc3545;
            border-color: #dc3545;
        }

        .btn-primary:hover, .btn-danger:hover {
            filter: brightness(90%);
        }

        .btn-add, .btn-back {
            margin-top: 20px;
        }
        .btn-back {
        background-color: #828282; 
        border-color: #808080;
        }
        .btn-back:hover {
        background-color: #ff0000; 
        color: #000000; 
        }
        .btn-add {
        background-color: rgb(0, 230, 0);
        border-color: rgb(179, 177, 177);
        }
        .btn-add:hover {
        background-color: #ffffff; 
        color: #000000; 
        }
        .credit {
            color: white;
        }
    </style>
{% endblock %}

{% block content %}           
    <h2 class="mb-4">Actualizar Pizza</h2>    
        <form method="post" class="mt-3 custom-form" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" style="margin-bottom: 20px;" class="btn btn-primary">Guardar Cambios</button>
            <div>
                <a href="{% url 'pizza' %}" class="btn btn-secondary exit-btn">Salir</a>
            </div>
        </form>
{% endblock %}

</html>

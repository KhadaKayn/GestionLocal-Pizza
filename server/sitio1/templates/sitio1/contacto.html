{% extends 'sitio1/base.html' %}
{% load crispy_forms_tags %}
{% load static %}
{% block js %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
{% endblock %}


{% block css %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
<style>
    body {
        background-image: url("{% static 'sitio1/imagenes/CRUD.jpg' %}");
        background-size: 100% 100%;
        background-position: center;
        padding: 0px;
        margin: 10px;
        height: 100vh;
        overflow: hidden;
    }
    .exit-btn {
        background-color: #808080; 
        border-color: #808080;
    }
    .exit-btn:hover {
    background-color: #ff0000; 
    color: #000000; 
    }
    .custom-form {
        font-size: 15px; /* Tamaño de letra personalizado */
        max-width: 1500px; /*AJUSTE DE FORMULARIO */
        margin: auto;
    }
    ul.errorlist {
    color: red;
    }
</style>
{% endblock %}


{% block content %}
<div class="row">
    <div class="col-12 col-md-6 offset-md-3">
        <div class="card">
            
            <div class="card-body">
                <h2>Contactanos!</h2>
                <form action="" method="post" id="formulario_contacto">
                    {{ form | crispy }}
                    {% csrf_token %}
                    <button type="reset" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" id="btnEnviar" class="btn btn-primary">Enviar</button>
                </form>
            </div>
        </div>
    
    </div>
</div>
</section>
{% endblock %}
